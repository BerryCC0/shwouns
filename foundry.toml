[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.19"
# ast: emit the compiler AST into each artifact (out/<file>.sol/<Contract>.json -> "ast") so the
# NatSpec coverage gate (script/check-natspec.py) can attribute members by declaration site (the node's
# src range falls in the in-scope file) rather than the flat ABI, which would synthesize
# inherited/OZ/public-getter members the contract doesn't itself declare.
ast = true
optimizer = true
optimizer_runs = 200
# via_ir: required to fit ShwounsDAOLogic under EIP-170. After the A3/A4 surgical splits the facade
# was still ~659 bytes over, and optimizer_runs alone bottomed out at ~207 over even at runs=1 — so
# the facade genuinely needs IR codegen. via_ir does NOT change storage layout (the storage gate
# re-verifies this). It hit a Yul stack-too-deep in the moved proposeBySigs/updateProposalBySigs,
# resolved by extracting helpers there (behaviour + EIP-712 digest unchanged; digest-stability test
# guards it).
via_ir = true
# ShwounsDeployer reads artifact bytecode (out/) at runtime to link libraries during deploy.
fs_permissions = [{ access = "read", path = "./out" }]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "erc6551/=src/vault/erc6551/",
]

[profile.default.fuzz]
runs = 256

# forge doc generates the per-function API reference book. Its default output dir is ./docs, which
# would clobber the curated Markdown tree (docs/overview.md, concepts/, architecture/, flows/), so the
# generated book is pinned to docs/reference/ — a sibling that the curated docs cross-link to. forge
# doc copies the root README.md as the book homepage, so keep README.md current.
[doc]
out = "docs/reference"
title = "Shwouns Contract Reference"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
